<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scholar-agent · your application command center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
      colors: { brand:{300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca'},
                ink:{900:'#0b1020',800:'#11172e',700:'#1c2440'} },
      boxShadow: { glow:'0 10px 40px -12px rgba(99,102,241,.45)' } } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body{background:radial-gradient(1200px 600px at 15% -10%,rgba(99,102,241,.18),transparent 60%),
         radial-gradient(900px 500px at 100% 0%,rgba(217,70,239,.12),transparent 55%),#07091a}
    .glass{background:rgba(17,23,46,.72);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.06)}
    .card-hover{transition:transform .2s,border-color .2s}.card-hover:hover{transform:translateY(-2px);border-color:rgba(129,140,248,.4)}
    .fade-in{animation:fade .35s ease both}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    [x-cloak]{display:none!important}
    .col-scroll::-webkit-scrollbar,.board::-webkit-scrollbar{height:10px;width:10px}
    .col-scroll::-webkit-scrollbar-thumb,.board::-webkit-scrollbar-thumb{background:#2a3358;border-radius:8px}
    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  </style>
</head>

<body class="font-sans text-slate-200 min-h-screen antialiased" x-data="app()" x-init="init()" x-cloak>

  <!-- ░░░░ AUTH GATE ░░░░ -->
  <template x-if="!authed">
    <div class="min-h-screen grid place-items-center px-5">
      <div class="glass rounded-3xl p-8 w-full max-w-md shadow-glow fade-in">
        <div class="flex items-center gap-3 mb-6">
          <div class="h-10 w-10 rounded-2xl bg-gradient-to-br from-brand-400 to-fuchsia-500 grid place-items-center shadow-glow"><span class="text-xl">🎓</span></div>
          <div>
            <h1 class="font-extrabold tracking-tight text-white text-lg leading-none">scholar<span class="text-brand-400">·</span>agent</h1>
            <p class="text-xs text-slate-400 mt-0.5">your application command center</p>
          </div>
        </div>
        <div class="flex gap-1 p-1 rounded-xl bg-ink-800/60 mb-5 text-sm">
          <button @click="authMode='login'" :class="authMode==='login'?'bg-brand-600 text-white':'text-slate-400'" class="flex-1 rounded-lg py-2 font-medium transition">Log in</button>
          <button @click="authMode='signup'" :class="authMode==='signup'?'bg-brand-600 text-white':'text-slate-400'" class="flex-1 rounded-lg py-2 font-medium transition">Sign up</button>
        </div>
        <form @submit.prevent="doAuth()" class="space-y-3">
          <input x-model="authEmail" type="email" required placeholder="you@example.com"
            class="w-full rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
          <input x-model="authPw" type="password" required minlength="8" placeholder="password (min 8 chars)"
            class="w-full rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
          <button type="submit" :disabled="busy"
            class="w-full rounded-xl py-2.5 font-semibold text-white bg-gradient-to-r from-brand-600 to-fuchsia-600 hover:from-brand-500 hover:to-fuchsia-500 disabled:opacity-50 transition shadow-glow"
            x-text="authMode==='login' ? 'Log in' : 'Create account'"></button>
          <p x-show="authErr" class="text-xs text-rose-400 text-center" x-text="authErr"></p>
        </form>
      </div>
    </div>
  </template>

  <!-- ░░░░ APP SHELL ░░░░ -->
  <template x-if="authed">
    <div>
      <header class="sticky top-0 z-20 glass border-b border-white/5">
        <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-xl bg-gradient-to-br from-brand-400 to-fuchsia-500 grid place-items-center"><span>🎓</span></div>
            <nav class="flex items-center gap-1 text-sm">
              <template x-for="n in nav" :key="n.id">
                <button @click="view=n.id" :class="view===n.id?'bg-brand-500/15 text-white':'text-slate-400 hover:text-white'" class="rounded-lg px-3 py-1.5 font-medium transition" x-text="n.label"></button>
              </template>
              <a href="/app/discover.html" class="rounded-lg px-3 py-1.5 font-medium text-slate-400 hover:text-white transition">🔍 Discover</a>
              <a href="/app/browse.html" class="rounded-lg px-3 py-1.5 font-medium text-slate-400 hover:text-white transition">📚 Browse</a>
              <a href="/app/surf.html" class="rounded-lg px-3 py-1.5 font-medium text-slate-400 hover:text-white transition">🌐 Build KB</a>
            </nav>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs text-slate-400 hidden sm:block" x-text="email"></span>
            <button @click="logout()" class="text-xs text-slate-400 hover:text-white transition">Log out</button>
          </div>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-5 py-7">

        <!-- ░░ DASHBOARD ░░ -->
        <section x-show="view==='dashboard'" class="fade-in">
          <h2 class="text-xl font-bold text-white mb-1">Dashboard</h2>
          <p class="text-sm text-slate-400 mb-5">Everything you're working on, at a glance.</p>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            <div class="glass rounded-2xl p-4"><p class="text-2xl font-extrabold text-white" x-text="total"></p><p class="text-xs text-slate-400 mt-0.5">applications</p></div>
            <div class="glass rounded-2xl p-4"><p class="text-2xl font-extrabold text-brand-400" x-text="inProgress"></p><p class="text-xs text-slate-400 mt-0.5">in progress</p></div>
            <div class="glass rounded-2xl p-4"><p class="text-2xl font-extrabold text-amber-300" x-text="appsByStatus('applied').length"></p><p class="text-xs text-slate-400 mt-0.5">applied</p></div>
            <div class="glass rounded-2xl p-4"><p class="text-2xl font-extrabold text-emerald-400" x-text="appsByStatus('offer').length"></p><p class="text-xs text-slate-400 mt-0.5">offers 🎉</p></div>
          </div>
          <div class="grid md:grid-cols-2 gap-4">
            <div class="glass rounded-2xl p-5">
              <h3 class="text-sm font-semibold text-white mb-3">⏳ Upcoming deadlines</h3>
              <template x-if="upcoming.length===0"><p class="text-sm text-slate-500">No upcoming deadlines. Add applications and set their deadlines to see them here.</p></template>
              <div class="space-y-2">
                <template x-for="a in upcoming" :key="a.id">
                  <div class="flex items-center justify-between rounded-xl bg-ink-800/50 px-3 py-2">
                    <div class="min-w-0"><p class="text-sm text-white truncate" x-text="a.title"></p><p class="text-xs text-slate-500" x-text="a.institution || '—'"></p></div>
                    <span class="text-xs px-2 py-0.5 rounded-full bg-amber-500/15 text-amber-200 shrink-0" x-text="a.deadline"></span>
                  </div>
                </template>
              </div>
            </div>
            <div class="glass rounded-2xl p-5">
              <h3 class="text-sm font-semibold text-white mb-3">📧 Follow-ups due</h3>
              <template x-if="followupsDue.length===0"><p class="text-sm text-slate-500">No follow-ups due. Set a follow-up date on a professor to get a nudge here.</p></template>
              <div class="space-y-2">
                <template x-for="p in followupsDue" :key="p.id">
                  <button @click="view='professors'; openProf(p)" class="w-full flex items-center justify-between rounded-xl bg-ink-800/50 px-3 py-2 text-left hover:bg-ink-800/80 transition">
                    <div class="min-w-0"><p class="text-sm text-white truncate" x-text="p.name"></p><p class="text-xs text-slate-500" x-text="p.university || '—'"></p></div>
                    <span class="text-xs px-2 py-0.5 rounded-full bg-rose-500/15 text-rose-300 shrink-0" x-text="p.next_followup_at"></span>
                  </button>
                </template>
              </div>
            </div>
          </div>
        </section>

        <!-- ░░ APPLICATIONS (pipeline board) ░░ -->
        <section x-show="view==='applications'" class="fade-in">
          <div class="flex items-center justify-between mb-4">
            <div><h2 class="text-xl font-bold text-white">Applications</h2><p class="text-sm text-slate-400">Your pipeline — move cards as you progress.</p></div>
            <button @click="showAdd=!showAdd" class="rounded-xl px-3 py-2 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500 transition">＋ Add</button>
          </div>

          <!-- add form -->
          <div x-show="showAdd" x-transition class="glass rounded-2xl p-4 mb-5">
            <div class="grid sm:grid-cols-2 gap-3">
              <input x-model="newApp.title" placeholder="Title * (e.g. Erasmus Mundus AI)" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="newApp.institution" placeholder="University / scheme" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="newApp.country" placeholder="Country" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="newApp.deadline" type="date" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm text-slate-300 focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <select x-model="newApp.kind" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none">
                <option value="scholarship">Scholarship</option><option value="phd">PhD</option><option value="masters">Master's</option><option value="postdoc">Postdoc</option>
              </select>
              <select x-model="newApp.status" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none">
                <template x-for="s in statuses" :key="s"><option :value="s" x-text="statusMeta[s].label"></option></template>
              </select>
            </div>
            <div class="mt-3 flex gap-2">
              <button @click="addApplication()" :disabled="!newApp.title.trim()" class="rounded-xl px-4 py-2 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500 disabled:opacity-40 transition">Save to pipeline</button>
              <button @click="showAdd=false" class="rounded-xl px-4 py-2 text-sm text-slate-400 hover:text-white transition">Cancel</button>
            </div>
          </div>

          <template x-if="applications.length===0 && !showAdd">
            <div class="glass rounded-3xl p-10 text-center"><div class="text-4xl mb-2">🗂️</div><p class="text-white font-semibold">No applications yet</p><p class="text-sm text-slate-400 mt-1">Add one manually, or <a href="/app/discover.html" class="text-brand-400 underline">discover opportunities</a> and save them.</p></div>
          </template>

          <!-- board -->
          <div x-show="applications.length" class="board flex gap-3 overflow-x-auto pb-3">
            <template x-for="s in statuses" :key="s">
              <div class="shrink-0 w-64">
                <div class="flex items-center gap-2 mb-2 px-1">
                  <span class="h-2 w-2 rounded-full" :style="`background:${statusMeta[s].color}`"></span>
                  <span class="text-sm font-semibold text-slate-200" x-text="statusMeta[s].label"></span>
                  <span class="text-xs text-slate-500" x-text="appsByStatus(s).length"></span>
                </div>
                <div class="col-scroll space-y-2 max-h-[68vh] overflow-y-auto pr-1">
                  <template x-for="a in appsByStatus(s)" :key="a.id">
                    <div class="glass card-hover rounded-2xl p-3 border border-white/8">
                      <div @click="openDetail(a)" class="cursor-pointer">
                        <p class="text-sm font-semibold text-white leading-snug line-clamp-2" x-text="a.title"></p>
                        <p class="text-xs text-slate-400 mt-1" x-text="[a.institution, a.country].filter(Boolean).join(' · ') || '—'"></p>
                        <div class="flex items-center gap-2 mt-2 flex-wrap">
                          <span x-show="a.kind" class="text-[10px] px-2 py-0.5 rounded-full bg-white/5 text-slate-300" x-text="a.kind"></span>
                          <span x-show="a.deadline" class="text-[10px] px-2 py-0.5 rounded-full bg-amber-500/15 text-amber-200" x-text="'⏳ '+a.deadline"></span>
                          <span x-show="a.checklist && a.checklist.length" class="text-[10px] px-2 py-0.5 rounded-full bg-brand-500/15 text-brand-200" x-text="checklistProgress(a)"></span>
                        </div>
                      </div>
                      <a x-show="a.source_url" :href="a.source_url" target="_blank" rel="noopener" class="inline-block mt-2 text-[11px] text-brand-400 hover:text-brand-300">🔗 posting ↗</a>
                      <div class="flex items-center gap-2 mt-2 pt-2 border-t border-white/5">
                        <select @change="setStatus(a, $event.target.value)" class="flex-1 rounded-lg bg-ink-800/60 border border-white/10 px-2 py-1 text-[11px] text-slate-300 focus:outline-none">
                          <template x-for="s2 in statuses" :key="s2"><option :value="s2" :selected="s2===a.status" x-text="statusMeta[s2].label"></option></template>
                        </select>
                        <button @click="removeApplication(a)" class="text-slate-500 hover:text-rose-400 text-xs px-1" title="Remove">✕</button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </section>

        <!-- ░░ PROFESSORS (outreach CRM) ░░ -->
        <section x-show="view==='professors'" class="fade-in">
          <div class="flex items-center justify-between mb-4">
            <div><h2 class="text-xl font-bold text-white">Professors</h2><p class="text-sm text-slate-400">Track outreach — who you've emailed, replies, and follow-ups.</p></div>
            <button @click="showAddProf=!showAddProf" class="rounded-xl px-3 py-2 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500 transition">＋ Add</button>
          </div>

          <div x-show="showAddProf" x-transition class="glass rounded-2xl p-4 mb-5">
            <div class="grid sm:grid-cols-2 gap-3">
              <input x-model="newProf.name" placeholder="Name * (e.g. Dr. A. Müller)" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="newProf.university" placeholder="University" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="newProf.department" placeholder="Department" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="newProf.email" type="email" placeholder="Email" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <select x-model="newProf.status" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:outline-none">
                <template x-for="s in profStatuses" :key="s"><option :value="s" x-text="profStatusMeta[s].label"></option></template>
              </select>
              <input x-model="newProf.next_followup_at" type="date" title="Follow-up date" class="rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm text-slate-300 focus:outline-none" />
            </div>
            <div class="mt-3 flex gap-2">
              <button @click="addProfessor()" :disabled="!newProf.name.trim()" class="rounded-xl px-4 py-2 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500 disabled:opacity-40 transition">Add professor</button>
              <button @click="showAddProf=false" class="rounded-xl px-4 py-2 text-sm text-slate-400 hover:text-white transition">Cancel</button>
            </div>
          </div>

          <template x-if="professors.length===0 && !showAddProf">
            <div class="glass rounded-3xl p-10 text-center"><div class="text-4xl mb-2">👤</div><p class="text-white font-semibold">No professors yet</p><p class="text-sm text-slate-400 mt-1">Add a professor you want to email and track the conversation.</p></div>
          </template>

          <div x-show="professors.length" class="grid sm:grid-cols-2 gap-3">
            <template x-for="p in professors" :key="p.id">
              <div class="glass card-hover rounded-2xl p-4 border border-white/8">
                <div @click="openProf(p)" class="cursor-pointer">
                  <div class="flex items-start justify-between gap-2">
                    <p class="text-sm font-semibold text-white" x-text="p.name"></p>
                    <span class="text-[10px] px-2 py-0.5 rounded-full shrink-0" :style="`background:${profStatusMeta[p.status].color}22;color:${profStatusMeta[p.status].color}`" x-text="profStatusMeta[p.status].label"></span>
                  </div>
                  <p class="text-xs text-slate-400 mt-0.5" x-text="[p.university, p.department].filter(Boolean).join(' · ') || '—'"></p>
                  <div class="flex items-center gap-2 mt-2 flex-wrap">
                    <span x-show="p.email" class="text-[11px] text-slate-500" x-text="p.email"></span>
                    <span x-show="p.thread && p.thread.length" class="text-[10px] px-2 py-0.5 rounded-full bg-white/5 text-slate-300" x-text="p.thread.length + ' msg'"></span>
                    <span x-show="p.next_followup_at" class="text-[10px] px-2 py-0.5 rounded-full" :class="profDue(p) ? 'bg-rose-500/15 text-rose-300' : 'bg-amber-500/15 text-amber-200'" x-text="(profDue(p)?'⚠ ':'📅 ')+p.next_followup_at"></span>
                  </div>
                </div>
                <div class="flex justify-end mt-2 pt-2 border-t border-white/5">
                  <button @click="removeProfessor(p)" class="text-slate-500 hover:text-rose-400 text-xs" title="Remove">✕</button>
                </div>
              </div>
            </template>
          </div>
        </section>

        <!-- ░░ PROFILE ░░ -->
        <section x-show="view==='profile'" class="fade-in max-w-2xl">
          <h2 class="text-xl font-bold text-white mb-1">Your profile</h2>
          <p class="text-sm text-slate-400 mb-5">Kept in one place — reused when drafting emails & SOPs.</p>
          <div class="glass rounded-2xl p-6 space-y-4">
            <label class="block">
              <span class="text-sm font-medium text-slate-200">Full name</span>
              <input x-model="profile.full_name" class="mt-1 w-full rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
            </label>
            <label class="block">
              <span class="text-sm font-medium text-slate-200">CV / background</span>
              <textarea x-model="profile.cv_text" rows="10" placeholder="Paste your CV text…" class="mt-1 w-full rounded-xl bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none"></textarea>
            </label>
            <button @click="saveProfile()" class="rounded-xl px-4 py-2 text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500 transition">Save profile</button>
          </div>
        </section>

      </main>

      <!-- ░░ APPLICATION DETAIL DRAWER ░░ -->
      <template x-if="detail">
        <div class="fixed inset-0 z-40" @keydown.escape.window="closeDetail()">
          <div class="absolute inset-0 bg-black/50" @click="closeDetail()"></div>
          <div class="absolute right-0 top-0 h-full w-full max-w-md glass border-l border-white/10 overflow-y-auto p-6 fade-in">
            <div class="flex items-start justify-between gap-3 mb-4">
              <input x-model="detail.title" class="flex-1 bg-transparent text-lg font-bold text-white focus:outline-none border-b border-transparent focus:border-white/20" />
              <button @click="closeDetail()" class="text-slate-400 hover:text-white text-xl leading-none shrink-0">✕</button>
            </div>
            <input x-model="detail.institution" placeholder="University / scheme"
              class="w-full rounded-lg bg-ink-800/60 border border-white/10 px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-brand-500 focus:outline-none" />
            <div class="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label class="text-xs text-slate-500">Status</label>
                <select x-model="detail.status" class="mt-1 w-full rounded-lg bg-ink-800/60 border border-white/10 px-2 py-2 text-sm focus:outline-none">
                  <template x-for="s in statuses" :key="s"><option :value="s" x-text="statusMeta[s].label"></option></template>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-500">Deadline</label>
                <input x-model="detail.deadline" type="date" class="mt-1 w-full rounded-lg bg-ink-800/60 border border-white/10 px-2 py-2 text-sm text-slate-300 focus:outline-none" />
              </div>
            </div>
            <a x-show="detail.source_url" :href="detail.source_url" target="_blank" rel="noopener" class="inline-block text-xs text-brand-400 hover:text-brand-300 mb-4">🔗 View original posting ↗</a>

            <!-- requirements checklist -->
            <div class="mb-4">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-semibold text-white">Requirements checklist</span>
                <span class="text-xs text-slate-400" x-show="detail.checklist.length" x-text="detailProgress()+'%'"></span>
              </div>
              <div class="h-1.5 rounded-full bg-white/10 mb-3 overflow-hidden" x-show="detail.checklist.length">
                <div class="h-full rounded-full bg-emerald-400 transition-all" :style="`width:${detailProgress()}%`"></div>
              </div>
              <div class="space-y-1.5">
                <template x-for="(it,idx) in detail.checklist" :key="idx">
                  <div class="flex items-center gap-2 group">
                    <input type="checkbox" x-model="it.done" class="accent-emerald-500 h-4 w-4 shrink-0" />
                    <span class="flex-1 text-sm" :class="it.done ? 'text-slate-500 line-through' : 'text-slate-200'" x-text="it.label"></span>
                    <button @click="removeItem(idx)" class="text-slate-600 hover:text-rose-400 text-xs opacity-0 group-hover:opacity-100 transition">✕</button>
                  </div>
                </template>
              </div>
              <div class="flex gap-2 mt-2">
                <input x-model="newItem" @keydown.enter="addItem()" placeholder="Add a requirement…"
                  class="flex-1 rounded-lg bg-ink-800/60 border border-white/10 px-3 py-1.5 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
                <button @click="addItem()" class="rounded-lg px-3 py-1.5 text-sm bg-brand-600 hover:bg-brand-500 text-white transition">Add</button>
              </div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <template x-for="c in commonItems" :key="c">
                  <button @click="addCommon(c)" class="text-[11px] px-2 py-0.5 rounded-full border border-white/10 text-slate-400 hover:text-white transition">＋ <span x-text="c"></span></button>
                </template>
              </div>
            </div>

            <label class="text-xs text-slate-500">Notes</label>
            <textarea x-model="detail.notes" rows="4" placeholder="Notes, professor contacts, todos…"
              class="mt-1 w-full rounded-lg bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none"></textarea>

            <div class="flex gap-2 mt-5">
              <button @click="saveDetail()" class="flex-1 rounded-xl py-2.5 text-sm font-semibold text-white bg-gradient-to-r from-brand-600 to-fuchsia-600 hover:from-brand-500 hover:to-fuchsia-500 transition">Save changes</button>
              <button @click="closeDetail()" class="rounded-xl px-4 py-2.5 text-sm text-slate-400 hover:text-white transition">Cancel</button>
            </div>
          </div>
        </div>
      </template>

      <!-- ░░ PROFESSOR DETAIL DRAWER ░░ -->
      <template x-if="profDetail">
        <div class="fixed inset-0 z-40" @keydown.escape.window="closeProf()">
          <div class="absolute inset-0 bg-black/50" @click="closeProf()"></div>
          <div class="absolute right-0 top-0 h-full w-full max-w-md glass border-l border-white/10 overflow-y-auto p-6 fade-in">
            <div class="flex items-start justify-between gap-3 mb-4">
              <input x-model="profDetail.name" class="flex-1 bg-transparent text-lg font-bold text-white focus:outline-none border-b border-transparent focus:border-white/20" />
              <button @click="closeProf()" class="text-slate-400 hover:text-white text-xl leading-none shrink-0">✕</button>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <input x-model="profDetail.university" placeholder="University" class="rounded-lg bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
              <input x-model="profDetail.department" placeholder="Department" class="rounded-lg bg-ink-800/60 border border-white/10 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:outline-none" />
            </div>
            <input x-model="profDetail.email" type="email" placeholder="Email" class="w-full rounded-lg bg-ink-800/60 border border-white/10 px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-brand-500 focus:outline-none" />
            <div class="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label class="text-xs text-slate-500">Stage</label>
                <select x-model="profDetail.status" class="mt-1 w-full rounded-lg bg-ink-800/60 border border-white/10 px-2 py-2 text-sm focus:outline-none">
                  <template x-for="s in profStatuses" :key="s"><option :value="s" x-text="profStatusMeta[s].label"></option></template>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-500">Follow-up on</label>
                <input x-model="profDetail.next_followup_at" type="date" class="mt-1 w-full rounded-lg bg-ink-800/60 border border-white/10 px-2 py-2 text-sm text-slate-300 focus:outline-none" />
              </div>
            </div>
            <label class="text-xs text-slate-500">Research fit</label>
            <textarea x-model="profDetail.research_fit" rows="2" placeholder="Why this lab fits you…" class="mt-1 w-full rounded-lg bg-ink-800/60 border border-white/10 px-3 py-2 text-sm mb-4 focus:ring-2 focus:ring-brand-500 focus:outline-none"></textarea>

            <!-- outreach thread -->
            <div class="mb-4">
              <span class="text-sm font-semibold text-white">Outreach log</span>
              <div class="space-y-2 mt-2">
                <template x-for="(msg,idx) in profDetail.thread" :key="idx">
                  <div class="rounded-xl bg-ink-800/50 p-3 group">
                    <div class="flex items-center justify-between gap-2">
                      <span class="text-[10px] px-2 py-0.5 rounded-full" :class="msg.direction==='sent' ? 'bg-brand-500/20 text-brand-200' : 'bg-emerald-500/15 text-emerald-300'" x-text="msg.direction==='sent' ? '↗ sent' : '↙ received'"></span>
                      <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-500" x-text="msg.at"></span>
                        <button @click="removeMessage(idx)" class="text-slate-600 hover:text-rose-400 text-xs opacity-0 group-hover:opacity-100 transition">✕</button>
                      </div>
                    </div>
                    <p x-show="msg.subject" class="text-xs font-medium text-white mt-1" x-text="msg.subject"></p>
                    <p x-show="msg.body" class="text-xs text-slate-400 mt-0.5 whitespace-pre-wrap" x-text="msg.body"></p>
                  </div>
                </template>
                <p x-show="profDetail.thread.length===0" class="text-xs text-slate-500">No messages logged yet.</p>
              </div>
              <!-- add message -->
              <div class="mt-2 rounded-xl border border-white/10 p-2 space-y-2">
                <div class="flex gap-2">
                  <select x-model="newMsg.direction" class="rounded-lg bg-ink-800/60 border border-white/10 px-2 py-1 text-xs focus:outline-none">
                    <option value="sent">↗ I sent</option><option value="received">↙ Received</option>
                  </select>
                  <input x-model="newMsg.subject" placeholder="Subject" class="flex-1 rounded-lg bg-ink-800/60 border border-white/10 px-2 py-1 text-xs focus:outline-none" />
                </div>
                <textarea x-model="newMsg.body" rows="2" placeholder="What was said…" class="w-full rounded-lg bg-ink-800/60 border border-white/10 px-2 py-1 text-xs focus:outline-none"></textarea>
                <button @click="addMessage()" class="w-full rounded-lg py-1.5 text-xs bg-brand-600 hover:bg-brand-500 text-white transition">＋ Log message</button>
              </div>
            </div>

            <div class="flex gap-2">
              <button @click="saveProf()" class="flex-1 rounded-xl py-2.5 text-sm font-semibold text-white bg-gradient-to-r from-brand-600 to-fuchsia-600 hover:from-brand-500 hover:to-fuchsia-500 transition">Save changes</button>
              <button @click="closeProf()" class="rounded-xl px-4 py-2.5 text-sm text-slate-400 hover:text-white transition">Cancel</button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>

  <div x-show="toast" x-transition class="fixed bottom-5 left-1/2 -translate-x-1/2 glass rounded-full px-4 py-2 text-sm text-white shadow-glow z-30" x-text="toast"></div>

  <script>
    function app() {
      return {
        token: localStorage.getItem('scholar_token') || '',
        user: null, email: '',
        authMode: 'login', authEmail: '', authPw: '', authErr: '', busy: false,
        view: 'dashboard',
        nav: [{id:'dashboard',label:'Dashboard'},{id:'applications',label:'Applications'},{id:'professors',label:'Professors'},{id:'profile',label:'Profile'}],
        applications: [],
        professors: [],
        profile: { full_name:'', cv_text:'', data:{} },
        newApp: { title:'', institution:'', country:'', kind:'scholarship', status:'interested', deadline:'' },
        newProf: { name:'', university:'', department:'', email:'', research_fit:'', status:'to_contact', next_followup_at:'' },
        showAdd: false, showAddProf: false, toast: '',
        detail: null, newItem: '',
        profDetail: null, newMsg: { direction:'sent', subject:'', body:'' },
        profStatuses: ['to_contact','emailed','replied','in_conversation','meeting','closed'],
        profStatusMeta: {
          to_contact:{label:'To contact',color:'#94a3b8'}, emailed:{label:'Emailed',color:'#818cf8'},
          replied:{label:'Replied',color:'#34d399'}, in_conversation:{label:'In conversation',color:'#a78bfa'},
          meeting:{label:'Meeting',color:'#fbbf24'}, closed:{label:'Closed',color:'#64748b'},
        },
        commonItems: ['SOP','CV','Motivation letter','3× Recommendation letters','Transcript','IELTS/TOEFL','GRE','Funding proof','Passport copy','Research proposal'],
        statuses: ['interested','preparing','applied','interview','offer','waitlisted','rejected'],
        statusMeta: {
          interested:{label:'Interested',color:'#818cf8'}, preparing:{label:'Preparing',color:'#38bdf8'},
          applied:{label:'Applied',color:'#a78bfa'}, interview:{label:'Interview',color:'#fbbf24'},
          offer:{label:'Offer',color:'#34d399'}, waitlisted:{label:'Waitlisted',color:'#f59e0b'}, rejected:{label:'Rejected',color:'#fb7185'},
        },

        get authed(){ return !!this.user; },
        get total(){ return this.applications.length; },
        get inProgress(){ return this.applications.filter(a=>!['offer','rejected','waitlisted'].includes(a.status)).length; },
        get upcoming(){
          const today = new Date().toISOString().slice(0,10);
          return this.applications.filter(a=>a.deadline && a.deadline>=today)
            .sort((x,y)=>String(x.deadline).localeCompare(String(y.deadline))).slice(0,6);
        },
        appsByStatus(s){ return this.applications.filter(a=>a.status===s); },
        checklistProgress(a){ const c=a.checklist||[]; return c.filter(i=>i.done).length+'/'+c.length+' ✓'; },
        get followupsDue(){
          const today = new Date().toISOString().slice(0,10);
          return this.professors.filter(p=>p.next_followup_at && p.next_followup_at<=today)
            .sort((x,y)=>String(x.next_followup_at).localeCompare(String(y.next_followup_at)));
        },
        profDue(p){ const today=new Date().toISOString().slice(0,10); return p.next_followup_at && p.next_followup_at<=today; },
        showToast(m){ this.toast=m; setTimeout(()=>this.toast='',1800); },

        // --- application detail drawer ---
        openDetail(a){
          this.detail = { id:a.id, title:a.title, institution:a.institution||'', country:a.country||'',
            kind:a.kind, status:a.status, deadline:a.deadline||'', source_url:a.source_url, notes:a.notes||'',
            checklist:(a.checklist||[]).map(i=>({label:i.label, done:!!i.done})) };
          this.newItem='';
        },
        closeDetail(){ this.detail=null; },
        addItem(){ const l=this.newItem.trim(); if(l){ this.detail.checklist.push({label:l, done:false}); this.newItem=''; } },
        addCommon(label){ if(!this.detail.checklist.some(i=>i.label===label)){ this.detail.checklist.push({label, done:false}); } },
        removeItem(idx){ this.detail.checklist.splice(idx,1); },
        detailProgress(){ const c=this.detail.checklist, d=c.filter(i=>i.done).length; return c.length ? Math.round(100*d/c.length) : 0; },
        async saveDetail(){
          const d=this.detail;
          const body={ title:d.title, institution:d.institution, status:d.status,
            deadline:d.deadline, notes:d.notes, checklist:d.checklist };
          const upd=await this.api('/me/applications/'+d.id, {method:'PATCH', body:JSON.stringify(body)});
          if(upd){ const i=this.applications.findIndex(x=>x.id===upd.id); if(i>=0) this.applications[i]=upd; this.detail=null; this.showToast('Saved'); }
        },

        // --- professors (outreach CRM) ---
        async loadProfessors(){ this.professors = (await this.api('/me/professors')) || []; },
        async addProfessor(){
          if(!this.newProf.name.trim()) return;
          const payload = Object.fromEntries(Object.entries(this.newProf).filter(([k,v])=>v!=='' && v!==null));
          const created = await this.api('/me/professors', {method:'POST', body:JSON.stringify(payload)});
          if(created){ this.professors.unshift(created);
            this.newProf={name:'',university:'',department:'',email:'',research_fit:'',status:'to_contact',next_followup_at:''};
            this.showAddProf=false; this.showToast('Professor added'); }
        },
        openProf(p){
          this.profDetail = { id:p.id, name:p.name, university:p.university||'', department:p.department||'',
            email:p.email||'', research_fit:p.research_fit||'', status:p.status,
            next_followup_at:p.next_followup_at||'', thread:(p.thread||[]).map(m=>({...m})) };
          this.newMsg={ direction:'sent', subject:'', body:'' };
        },
        closeProf(){ this.profDetail=null; },
        addMessage(){
          const m=this.newMsg; if(!m.subject.trim() && !m.body.trim()) return;
          this.profDetail.thread.push({ direction:m.direction, subject:m.subject, body:m.body, at:new Date().toISOString().slice(0,10) });
          this.newMsg={ direction:'sent', subject:'', body:'' };
        },
        removeMessage(idx){ this.profDetail.thread.splice(idx,1); },
        async saveProf(){
          const d=this.profDetail;
          const body={ name:d.name, university:d.university, department:d.department, email:d.email,
            research_fit:d.research_fit, status:d.status, next_followup_at:d.next_followup_at, thread:d.thread };
          const upd=await this.api('/me/professors/'+d.id, {method:'PATCH', body:JSON.stringify(body)});
          if(upd){ const i=this.professors.findIndex(x=>x.id===upd.id); if(i>=0){ this.professors[i]=upd; } this.profDetail=null; this.showToast('Saved'); }
        },
        async removeProfessor(p){
          if(!confirm('Remove "'+p.name+'"?')) return;
          const ok=await this.api('/me/professors/'+p.id, {method:'DELETE'});
          if(ok) this.professors = this.professors.filter(x=>x.id!==p.id);
        },

        async init(){
          if(!this.token) return;
          const me = await this.api('/auth/me');
          if(me){ this.user=me; this.email=me.email; await this.loadAll(); }
          else { this.logout(); }
        },

        async api(path, opts={}){
          opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
          if(this.token) opts.headers['Authorization'] = 'Bearer '+this.token;
          const r = await fetch(path, opts);
          if(r.status===401){ this.logout(); return null; }
          if(r.status===204) return true;
          const body = await r.json().catch(()=>null);
          if(!r.ok) throw new Error((body && body.detail) || ('HTTP '+r.status));
          return body;
        },

        async doAuth(){
          this.authErr=''; this.busy=true;
          try{
            const path = this.authMode==='login' ? '/auth/login' : '/auth/signup';
            const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email:this.authEmail, password:this.authPw})});
            const body = await r.json();
            if(!r.ok) throw new Error(typeof body.detail==='string' ? body.detail : 'Please check your details');
            this.token = body.access_token; localStorage.setItem('scholar_token', this.token);
            this.user = {user_id:body.user_id, email:body.email}; this.email = body.email;
            this.authPw=''; this.view='dashboard'; await this.loadAll();
          }catch(e){ this.authErr = e.message; }
          finally{ this.busy=false; }
        },
        logout(){ this.token=''; this.user=null; localStorage.removeItem('scholar_token'); },

        async loadAll(){ await Promise.all([this.loadApplications(), this.loadProfessors(), this.loadProfile()]); },
        async loadApplications(){ this.applications = (await this.api('/me/applications')) || []; },
        async loadProfile(){
          try{ const p = await this.api('/me/profile'); if(p) this.profile = {data:{}, ...p}; }
          catch(_){ /* 404: no profile yet — keep defaults */ }
        },
        async addApplication(){
          if(!this.newApp.title.trim()) return;
          const payload = Object.fromEntries(Object.entries(this.newApp).filter(([k,v])=>v!=='' && v!==null));
          const created = await this.api('/me/applications', {method:'POST', body: JSON.stringify(payload)});
          if(created){ this.applications.unshift(created);
            this.newApp={title:'',institution:'',country:'',kind:'scholarship',status:'interested',deadline:''};
            this.showAdd=false; this.showToast('Saved to pipeline'); }
        },
        async setStatus(a, status){
          const upd = await this.api('/me/applications/'+a.id, {method:'PATCH', body: JSON.stringify({status})});
          if(upd){ a.status = upd.status; this.showToast('Moved to '+this.statusMeta[status].label); }
        },
        async removeApplication(a){
          if(!confirm('Remove "'+a.title+'"?')) return;
          const ok = await this.api('/me/applications/'+a.id, {method:'DELETE'});
          if(ok) this.applications = this.applications.filter(x=>x.id!==a.id);
        },
        async saveProfile(){
          const p = await this.api('/me/profile', {method:'PUT', body: JSON.stringify(this.profile)});
          if(p){ this.profile = {data:{}, ...p}; this.showToast('Profile saved'); }
        },
      };
    }
  </script>
</body>
</html>
