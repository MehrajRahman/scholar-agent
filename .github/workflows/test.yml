name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,web]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (type check)
        run: mypy src

      - name: Pytest (48 offline unit tests — no infra needed)
        run: pytest -q
